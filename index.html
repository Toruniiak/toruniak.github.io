<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beka w Pigułce</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <!-- Tło z gradientem i gwiazdkami -->
  <div class="background"></div>

  <div class="container">
    <!-- Nagłówek -->
    <header>
      <div class="top-bar">
        <div class="logo">
          <span class="emoji">😂</span>
          <span class="title">Beka</span>
        </div>
        <nav>
          <a href="#" class="active">Home</a>
          <a href="#">Memy</a>
          <a href="#">Zagadki</a>
          <a href="#">Testy</a>
        </nav>
      </div>
    </header>

    <!-- Baner główny -->
    <section class="hero">
      <div class="hero-content">
        <h1>BEKA<br><span class="highlight">W PIGUŁCE</span></h1>
        <p class="subtitle">TWOJA CODZIENNA DAWKA ŚMIECHU</p>
        
        <div class="monkey-container">
          <!-- Tu możesz wstawić obrazek małpki lub użyć emoji/ikony -->
          <div class="monkey">🐵</div>
        </div>

        <button class="btn-primary" onclick="showMemes()">
          <span class="emoji">😂</span> Zobacz memy
        </button>
      </div>
    </section>

    <!-- Kafelki -->
    <section class="cards">
      <div class="card">
        <h3>😂 Najnowsze memy</h3>
        <p>Świeże wrzutki pod viral.</p>
        <button class="btn-yellow" onclick="showMemes()">Wejdź</button>
      </div>

      <div class="card">
        <h3>🧠 Zagadki</h3>
        <p>Sprawdź swój mózg</p>
        <button class="btn-purple" onclick="startRiddles()">Start</button>
      </div>

      <div class="card">
        <h3>😂 Testy</h3>
        <p>Kto jest Twoim ziomkiem?</p>
        <button class="btn-yellow" onclick="startTest()">Wejdź</button>
      </div>

      <div class="card">
        <h3>🔥 Testy</h3>
        <p>Kto jest Twoim ziomkiem?</p>
        <button class="btn-orange" onclick="startTest()">Sprawdź</button>
      </div>
    </section>

    <!-- Facebook -->
    <section class="facebook">
      <h2>😂 Dołącz do nas na Facebooku</h2>
      <button class="btn-fb" onclick="window.open('https://facebook.com', '_blank')">
        <i class="fab fa-facebook"></i> Obserwuj
      </button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
