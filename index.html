<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beka w Pigułce</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAV -->
<div class="nav">
    😂 Beka
</div>

<!-- HERO -->
<section class="hero">
    <img src="assets/banner.jpg" class="banner">
    
    <h1>BEKA W PIGUŁCE</h1>
    <p>Twoja codzienna dawka śmiechu 🔥</p>

    <a href="#" class="main-btn">😂 Zobacz memy</a>
</section>

<!-- GRID -->
<section class="grid">

    <div class="card">
        <h3>😂 Najnowsze memy</h3>
        <p>Świeże wrzutki pod viral</p>
        <button class="btn">Wejdź</button>
    </div>

    <div class="card">
        <h3>🧩 Zagadki</h3>
        <p>Sprawdź swój mózg</p>
        <button class="btn purple">Start</button>
    </div>

    <div class="card">
        <h3>🔥 Testy</h3>
        <p>Kto jest Twoim ziomkiem?</p>
        <button class="btn orange">Sprawdź</button>
    </div>

</section>

<!-- CTA -->
<section class="cta">
    <h2>😂 Dołącz do nas na Facebooku</h2>
    <button class="fb-btn">📘 Obserwuj</button>
</section>

<script src="js/app.js"></script>

</html>
